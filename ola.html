<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Gabitegon ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .container {
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    h1 { font-size: 3em; animation: fadeDown 1s ease; }
    h2 { margin-bottom: 30px; animation: fadeDown 1.5s ease; }

    .card {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 20px;
      margin: 15px auto;
      max-width: 400px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: 0.3s;
      cursor: pointer;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s forwards;
    }

    .card:hover {
      transform: translateY(-15px) scale(1.05);
      box-shadow: 0 0 25px rgba(255,255,255,0.9);
    }

    .heart {
      font-size: 40px;
      animation: pulse 1.5s infinite;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: #ff4f7a;
      font-weight: bold;
      cursor: pointer;
      margin: 10px;
      position: relative;
      transition: 0.3s;
    }

    #noBtn {
      position: absolute;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    @keyframes fadeUp {
      to { opacity:1; transform: translateY(0);} }

    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-30px);} 
      to { opacity:1; transform: translateY(0);} }

    .falling-heart {
      position: fixed;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
      z-index: 1;
    }

    @keyframes fall {
      to { transform: translateY(110vh); }
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Para você, Gabitegon ❤️</h1>
    <h2>Um pedacinho do que eu sinto...</h2>

    <div class="card">Desde que você apareceu, tudo ficou mais bonito.</div>
    <div class="card">Seu sorriso é o meu lugar favorito no mundo.</div>
    <div class="card">Não sei explicar, mas com você tudo faz sentido.</div>
    <div class="card">Se for pra sonhar, que seja com você ao meu lado.</div>

    <div class="heart">❤️</div>

    <h2>Você quer ficar comigo? 💖</h2>
    <button class="btn" onclick="responderSim()">Sim 💖</button>
    <button class="btn" id="noBtn">Não 😅</button>

  </div>

  <audio id="hoverSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
  <audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" autoplay loop></audio>

  <script>
    const cards = document.querySelectorAll('.card');
    const sound = document.getElementById('hoverSound');
    const noBtn = document.getElementById('noBtn');

    cards.forEach(card => {
      card.addEventListener('mouseenter', () => {
        sound.currentTime = 0;
        sound.play();
      });
    });

    noBtn.addEventListener('mouseover', () => {
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    });

    function responderSim() {
      alert('Eu sabia! ❤️ Você é muito especial pra mim!');
    }

    // corações caindo
    function criarCoracao() {
      const heart = document.createElement('div');
      heart.classList.add('falling-heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * window.innerWidth + 'px';
      heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(criarCoracao, 300);
  </script>

</body>
</html>
